name: Patch partyroom mobile layout

on:
  push:
    paths:
      - '.github/workflows/patch-partyroom-mobile-layout.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert mobile fix stylesheet
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('partyroom/index.html')
          text = path.read_text(encoding='utf-8')
          link = '  <link rel="stylesheet" href="/partyroom/mobile-fix.css?v=20260711-mobile-fix-v1">\n'
          anchor = '  <link rel="stylesheet" href="/partyroom/site.css?v=20260710-review">\n'
          if 'mobile-fix.css' not in text:
              text = text.replace(anchor, anchor + link, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html
          git diff --cached --quiet || git commit -m 'Fix partyroom mobile floorplan and fixed header [skip ci]'
          git push
