name: Remove visible skip link

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/remove-skip-link.yml

permissions:
  contents: write

jobs:
  patch-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove skip-link elements from HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pattern = re.compile(
              r'<a\b[^>]*class=["\'][^"\']*\bskip-link\b[^"\']*["\'][^>]*>.*?</a>',
              re.IGNORECASE | re.DOTALL,
          )

          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              original = path.read_text(encoding='utf-8')
              updated = pattern.sub('', original)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          for item in changed:
              print('-', item)
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No skip links found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git commit -m "Remove flashing skip links from HTML"
          git push
