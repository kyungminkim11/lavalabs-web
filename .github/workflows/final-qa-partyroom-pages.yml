name: Final QA partyroom pages

on:
  push:
    paths:
      - '.github/workflows/final-qa-partyroom-pages.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply final static UX and content fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          # ---------- Customer-facing partyroom site ----------
          p = Path('partyroom/index.html')
          html = p.read_text(encoding='utf-8')

          if '/partyroom/final-qa.css' not in html:
              html = html.replace('</head>', '  <link rel="stylesheet" href="/partyroom/final-qa.css?v=20260711-final-qa-v1">\n</head>', 1)
          if '/partyroom/final-qa.js' not in html:
              html = html.replace('</body>', '  <script src="/partyroom/final-qa.js?v=20260711-final-qa-v1"></script>\n</body>', 1)

          html = html.replace(
              '<a href="#space">공간</a><a href="#tour">360° 투어</a><a href="#facilities">시설</a><a href="#guide">이용 안내</a><a href="#booking">예약 안내</a>',
              '<a href="#space">공간</a><a href="#tour">360° 투어</a><a href="#facilities">시설</a><a href="#games">게임</a><a href="#guide">이용 안내</a><a href="#location">위치</a><a href="#booking">예약</a>'
          )

          html = re.sub(
              r'<div class="hero-actions">.*?</div>',
              '<div class="hero-actions"><a class="button hero-booking" href="https://naver.me/FdqhKL45" target="_blank" rel="noopener">네이버 예약하기 <span aria-hidden="true">↗</span></a><a class="button secondary" href="#tour">360°로 미리 둘러보기</a><a class="button secondary" href="#space">실제 공간 사진 보기</a></div>',
              html,
              count=1,
              flags=re.S
          )

          html = html.replace(
              '<header class="section-head light"><p class="kicker">BOOKING & VISIT</p><h2>예약 전에 필요한 정보를<br>한 번에 확인하세요.</h2><p>예약 채널과 운영 정보는 한 곳에서 관리할 수 있도록 별도 설정 파일로 구성했습니다.</p></header>',
              '<header class="section-head light"><p class="kicker">BOOKING & VISIT</p><h2>이용 시간과 요금을<br>한눈에 비교하세요.</h2><p>낮·밤·올데이 상품의 시간과 평일·주말 요금을 비교한 뒤 원하는 예약 채널을 선택할 수 있습니다.</p></header>'
          )
          html = html.replace(
              '<p class="booking-label">RESERVATION</p><h3>원하는 날짜와 인원을 확인한 뒤 예약해 주세요.</h3>',
              '<p class="booking-label">RESERVATION</p><h3>현재 예약과 이용은<br>퓨처스페이스 1호 기준입니다.</h3>'
          )

          pricing = '''<div class="booking-pricing" aria-label="퓨처스페이스 이용 요금과 운영 기준">
            <div class="rate-card-grid">
              <article class="rate-card">
                <div class="rate-card__head"><span>DAY</span><b>6시간</b></div>
                <h4>낮 타임</h4><p class="rate-time"><strong>11:00</strong><i>→</i><strong>17:00</strong></p>
                <dl class="rate-prices"><div><dt>평일 · 월~금</dt><dd>100,000원</dd></div><div><dt>주말 · 공휴일</dt><dd>180,000원</dd></div></dl>
              </article>
              <article class="rate-card rate-card--accent">
                <div class="rate-card__head"><span>NIGHT</span><b>6시간 30분</b></div>
                <h4>밤 타임</h4><p class="rate-time"><strong>18:30</strong><i>→</i><strong>01:00</strong></p>
                <dl class="rate-prices"><div><dt>평일 · 월~금</dt><dd>129,000원</dd></div><div><dt>주말 · 공휴일</dt><dd>209,000원</dd></div></dl>
                <p class="rate-option">밤샘 추가 가능</p>
              </article>
              <article class="rate-card">
                <div class="rate-card__head"><span>ALL DAY</span><b>14시간</b></div>
                <h4>올데이</h4><p class="rate-time"><strong>11:00</strong><i>→</i><strong>01:00</strong></p>
                <dl class="rate-prices"><div><dt>평일 · 월~금</dt><dd>159,000원</dd></div><div><dt>주말 · 공휴일</dt><dd>239,000원</dd></div></dl>
                <p class="rate-option">밤샘 추가 가능</p>
              </article>
            </div>
            <div class="booking-essentials" aria-label="인원과 추가요금">
              <article><span>기준 인원</span><strong>6인</strong></article>
              <article><span>최대 인원</span><strong>20인</strong></article>
              <article><span>인원 추가</span><strong>1인당 10,000원</strong><small>6인 초과 시</small></article>
              <article><span>밤샘 추가</span><strong>30,000원</strong><small>다음 날 09:00 퇴실</small></article>
            </div>
            <div class="booking-notices">
              <p><b>보증금</b><span>시설·청소 보증금 100,000원 별도 · 퇴실 점검 후 1~3일 내 환급</span></p>
              <p><b>군인 할인</b><span>군인 신분 인증 시 최종 이용요금 10% 할인</span></p>
            </div>
          </div>'''
          html = re.sub(r'<dl class="booking-facts">.*?</dl>', pricing, html, count=1, flags=re.S)

          final_faq = '''<div class="faq-list">
            <details><summary>이용 시간은 어떻게 나뉘나요?</summary><p>낮 타임은 11:00~17:00, 밤 타임은 18:30~01:00, 올데이는 11:00~01:00입니다. 밤 타임 또는 올데이에 밤샘 옵션을 추가하면 다음 날 09:00에 퇴실합니다.</p></details>
            <details><summary>기준 인원과 추가 요금은 얼마인가요?</summary><p>기준 인원은 6인, 예약 상품 기준 최대 20인입니다. 6인 초과 시 1인당 1만원의 추가 요금이 발생합니다.</p></details>
            <details><summary>주차는 가능한가요?</summary><p>건물 주차장에 차량 2대까지 무료로 주차할 수 있으며 별도의 시간 제한은 없습니다.</p></details>
            <details><summary>미성년자도 이용할 수 있나요?</summary><p>미성년자와 2006년생은 22시까지 이용할 수 있으며 초등학생은 보호자 동반이 필요합니다. 주류 반입은 성인만 가능합니다.</p></details>
            <details><summary>취사와 음식 반입이 가능한가요?</summary><p>배달과 포장음식 반입이 가능하며 인덕션으로 라면 등 간단한 조리를 할 수 있습니다. 이용 후 원위치 정리와 쓰레기 정리를 부탁드립니다.</p></details>
            <details><summary>보증금과 환불 규정은 어떻게 되나요?</summary><p>시설·청소 보증금 10만원이 별도이며 퇴실 점검 후 1~3일 내 환급됩니다. 파손, 과도한 오염, 실내 흡연, 정리 미흡 또는 절도 발생 시 차감되거나 환급되지 않을 수 있으며 당일 취소는 환불되지 않습니다.</p></details>
          </div>'''
          html = re.sub(r'<div class="faq-list">.*?</div>\s*</div>\s*</section>', final_faq + '\n    </div>\n  </section>', html, count=1, flags=re.S)

          if '"address":{"@type":"PostalAddress"' not in html:
              html = html.replace(
                  '"openingHours":"Mo-Su 00:00-24:00",',
                  '"openingHours":"Mo-Su 00:00-24:00",\n    "address":{"@type":"PostalAddress","streetAddress":"송학1길 67-21, 1층","addressLocality":"파주시","addressRegion":"경기도","addressCountry":"KR"},\n    "hasMap":"https://naver.me/FdqhKL45",'
              )
          if 'og:image:alt' not in html:
              html = html.replace('<meta property="og:image:height" content="630">', '<meta property="og:image:height" content="630">\n  <meta property="og:image:alt" content="퓨처스페이스 게임파티룸의 실제 공간과 게임 시설">')

          p.write_text(html, encoding='utf-8')

          # ---------- Portfolio case-study page ----------
          p = Path('works/partyroom-360-tour/index.html')
          html = p.read_text(encoding='utf-8')
          if '/works/partyroom-360-tour/final-qa.css' not in html:
              html = html.replace('</head>', '  <link rel="stylesheet" href="/works/partyroom-360-tour/final-qa.css?v=20260711-final-qa-v1">\n</head>', 1)
          if '/works/partyroom-360-tour/final-qa.js' not in html:
              html = html.replace('</body>', '  <script src="/works/partyroom-360-tour/final-qa.js?v=20260711-final-qa-v1" defer></script>\n</body>', 1)

          html = html.replace('PC, PS5, 노래방, 홀덤, 보드게임과 주방 시설을 사진으로 확인합니다.', '고사양 PC 5대, PS5·Switch 2, 노래방, 홀덤, 보드게임과 주방 시설을 사진으로 확인합니다.')
          html = html.replace('<p>CONSOLE LIBRARY</p><h3>PS5 · Nintendo Switch</h3>', '<p>CONSOLE LIBRARY</p><h3>PS5 · Nintendo Switch 2</h3>')
          html = html.replace(
              '<ul class="tag-list"><li>철권 8</li><li>EA SPORTS FC 25</li><li>MLB The Show 24</li><li>ASTRO BOT</li><li>Nintendo Switch Sports</li><li>Super Mario Party Jamboree</li></ul>',
              '<ul class="tag-list"><li>철권 8</li><li>EA SPORTS FC 25</li><li>MLB The Show 24</li><li>UFC 5</li><li>Overcooked</li><li>Mario Kart World</li><li>Mario Party</li><li>Nintendo Switch Sports</li></ul>'
          )
          html = html.replace('alt="PS5와 닌텐도 스위치 대표 게임 타이틀"', 'alt="PS5와 닌텐도 스위치 2 대표 게임 타이틀"')
          html = html.replace('<div class="live-points"><span>모바일 최적화</span><span>사진 확대</span><span>지도·길찾기</span><span>운영 정보 관리</span></div>', '<div class="live-points"><span>모바일 최적화</span><span>사진 확대</span><span>지도·길찾기</span><span>네이버·스페이스클라우드 예약</span></div>')
          html = html.replace('case.js?v=20260711-final-v1', 'case.js?v=20260711-final-v2')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Validate final QA output
        shell: bash
        run: |
          grep -q 'partyroom/final-qa.css' partyroom/index.html
          grep -q '네이버 예약하기' partyroom/index.html
          grep -q 'class="booking-pricing"' partyroom/index.html
          grep -q 'address":{"@type":"PostalAddress"' partyroom/index.html
          grep -q 'partyroom-360-tour/final-qa.css' works/partyroom-360-tour/index.html
          grep -q 'Nintendo Switch 2' works/partyroom-360-tour/index.html
          grep -q 'case.js?v=20260711-final-v2' works/partyroom-360-tour/index.html

      - name: Commit final QA changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html works/partyroom-360-tour/index.html
          git diff --cached --quiet || git commit -m 'Finalize partyroom live and case-study UX [skip ci]'
          git push
