name: Upgrade partyroom case v5

on:
  push:
    paths:
      - '.github/workflows/upgrade-partyroom-case-v5.yml'

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch case study
        run: python .github/scripts/upgrade_partyroom_case_v5.py
      - name: Commit upgrade
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add works/partyroom-360-tour/index.html works/partyroom-360-tour/case.css works/partyroom-360-tour/case.js
          if git diff --cached --quiet; then
            echo 'No changes needed'
          else
            git commit -m 'Add interactive information design and scope builder [skip ci]'
            git push
          fi
