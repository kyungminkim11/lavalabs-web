name: Import adjusted partyroom assets

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/import-partyroom-adjusted-assets.yml'

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and install adjusted web assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p partyroom/assets
          curl -L --fail --retry 3 --retry-delay 2 'https://at.adobe.com/mApzH37iPcB5meqR' -o /tmp/partyroom-adjusted-assets.zip
          unzip -t /tmp/partyroom-adjusted-assets.zip
          unzip -o /tmp/partyroom-adjusted-assets.zip -d partyroom/assets
          ls -lh partyroom/assets

      - name: Commit adjusted image assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/assets
          if git diff --cached --quiet; then
            echo 'No asset changes to commit.'
            exit 0
          fi
          git commit -m 'Replace partyroom images with adjusted high-resolution photos'
          git push
