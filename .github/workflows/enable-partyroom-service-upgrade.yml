name: Enable partyroom service upgrade

on:
  push:
    paths:
      - '.github/workflows/enable-partyroom-service-upgrade.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load the service upgrade
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('partyroom/site.js')
          text = path.read_text(encoding='utf-8')
          marker = 'service-upgrade.js?v=20260710-location-games'
          loader = '''\n\n// Service-level content: corrected floorplan, game inventory and location map.\nif (!document.querySelector(`script[src*="${marker}"]`)) {\n  const serviceUpgradeScript = document.createElement("script");\n  serviceUpgradeScript.src = "/partyroom/service-upgrade.js?v=20260710-location-games";\n  serviceUpgradeScript.defer = true;\n  document.body.appendChild(serviceUpgradeScript);\n}\n'''.replace('${marker}', marker)
          if marker not in text:
              path.write_text(text.rstrip() + loader, encoding='utf-8')
          PY

          rm -f .github/workflows/enable-partyroom-service-upgrade.yml

      - name: Commit upgrade loader
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/site.js .github/workflows/enable-partyroom-service-upgrade.yml
          if git diff --cached --quiet; then
            echo 'No changes.'
            exit 0
          fi
          git commit -m 'Enable corrected floorplan, game list and map'
          git push
