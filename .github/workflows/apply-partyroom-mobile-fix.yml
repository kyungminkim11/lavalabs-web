name: Apply partyroom mobile fix

on:
  push:
    paths:
      - '.github/workflows/apply-partyroom-mobile-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link mobile stylesheet and refresh cache keys
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('works/partyroom-360-tour/index.html')
          html = path.read_text(encoding='utf-8')

          old = '<link rel="stylesheet" href="/works/partyroom-360-tour/case.css?v=20260711-case-v5">'
          new = old + '\n  <link rel="stylesheet" href="/works/partyroom-360-tour/case-mobile.css?v=20260711-mobile-v1">'
          if 'case-mobile.css' not in html:
              html = html.replace(old, new)

          html = html.replace('case.js?v=20260711-case-v5', 'case.js?v=20260711-mobile-v1')
          html = html.replace('20260711-case-v5', '20260711-mobile-v1')
          path.write_text(html, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add works/partyroom-360-tour/index.html
          git commit -m "Fix partyroom case mobile layout and refresh Pages" || exit 0
          git push
