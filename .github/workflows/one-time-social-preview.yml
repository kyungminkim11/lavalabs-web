name: Apply social sharing metadata

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/one-time-social-preview.yml'

permissions:
  contents: write

jobs:
  apply-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Open Graph and Twitter metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html
          import re

          base_url = "https://space.lavalabs.co.kr"
          image_url = f"{base_url}/assets/lavalabs-social-preview.png"
          default_description = "홈페이지, 360° 가상투어, 공간 사진, QR 메뉴판, 업무 자동화로 작은 매장과 브랜드의 온라인 운영을 돕는 디지털 스튜디오입니다."

          start_marker = "<!-- SOCIAL_META_START -->"
          end_marker = "<!-- SOCIAL_META_END -->"

          for path in Path('.').rglob('*.html'):
              if any(part in {'.git', 'node_modules', 'vendor'} for part in path.parts):
                  continue

              text = path.read_text(encoding='utf-8')
              if '<head' not in text.lower() or '<title>' not in text.lower():
                  continue

              text = re.sub(
                  rf'{re.escape(start_marker)}.*?{re.escape(end_marker)}',
                  '',
                  text,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              text = re.sub(r'<link\s+rel=["\']canonical["\'][^>]*>', '', text, flags=re.IGNORECASE)
              text = re.sub(
                  r'<meta\s+(?:property|name)=["\'](?:og:[^"\']+|twitter:[^"\']+)["\'][^>]*>',
                  '',
                  text,
                  flags=re.IGNORECASE,
              )

              title_match = re.search(r'<title>(.*?)</title>', text, flags=re.IGNORECASE | re.DOTALL)
              description_match = re.search(
                  r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\'][^>]*>',
                  text,
                  flags=re.IGNORECASE | re.DOTALL,
              )

              raw_title = html.unescape(title_match.group(1).strip()) if title_match else 'LavaLabs'
              raw_description = html.unescape(description_match.group(1).strip()) if description_match else default_description
              title = html.escape(raw_title, quote=True)
              description = html.escape(raw_description, quote=True)

              relative = path.relative_to(Path('.')).as_posix()
              if relative == 'index.html':
                  canonical = f'{base_url}/'
              elif relative.endswith('/index.html'):
                  canonical = f"{base_url}/{relative[:-10]}"
              else:
                  canonical = f'{base_url}/{relative}'

              meta = (
                  f'{start_marker}'
                  f'<link rel="canonical" href="{canonical}">'
                  f'<meta property="og:type" content="website">'
                  f'<meta property="og:locale" content="ko_KR">'
                  f'<meta property="og:site_name" content="LavaLabs">'
                  f'<meta property="og:title" content="{title}">'
                  f'<meta property="og:description" content="{description}">'
                  f'<meta property="og:url" content="{canonical}">'
                  f'<meta property="og:image" content="{image_url}">'
                  f'<meta property="og:image:secure_url" content="{image_url}">'
                  f'<meta property="og:image:type" content="image/png">'
                  f'<meta property="og:image:width" content="1200">'
                  f'<meta property="og:image:height" content="630">'
                  f'<meta property="og:image:alt" content="LavaLabs — 공간을 보여주고, 운영을 단순하게">'
                  f'<meta name="twitter:card" content="summary_large_image">'
                  f'<meta name="twitter:title" content="{title}">'
                  f'<meta name="twitter:description" content="{description}">'
                  f'<meta name="twitter:image" content="{image_url}">'
                  f'<meta name="twitter:image:alt" content="LavaLabs — 공간을 보여주고, 운영을 단순하게">'
                  f'{end_marker}'
              )

              title_tag = title_match.group(0) if title_match else None
              if title_tag:
                  text = text.replace(title_tag, meta + title_tag, 1)
              else:
                  text = re.sub(r'(<head[^>]*>)', r'\1' + meta, text, count=1, flags=re.IGNORECASE)

              path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm -f .github/workflows/one-time-social-preview.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Add social sharing previews across public pages"
            git push origin HEAD:main
          fi
