name: Refresh partyroom owner config

on:
  push:
    paths:
      - '.github/workflows/refresh-partyroom-owner-config.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh config cache key
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('partyroom/index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('/partyroom/site-config.js?v=20260710-review','/partyroom/site-config.js?v=20260711-owner-info-v1')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html
          git diff --cached --quiet || git commit -m 'Refresh confirmed partyroom owner info [skip ci]'
          git push
