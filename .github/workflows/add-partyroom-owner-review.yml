name: Add partyroom owner review fields

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-partyroom-owner-review.yml'

permissions:
  contents: write

jobs:
  update-review-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add review placeholders and owner checklist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index = Path('partyroom/index.html')
          css = Path('partyroom/site.css')
          js = Path('partyroom/site.js')
          config = Path('partyroom/site-config.js')

          html = index.read_text(encoding='utf-8')
          html = html.replace('<meta name="robots" content="index,follow,max-image-preview:large">', '<meta name="robots" content="noindex,nofollow,noarchive">')
          html = html.replace('20260710-service', '20260710-review')

          review_banner = '''\n<div class="review-banner" role="status">\n  <div class="shell review-banner-inner">\n    <div><b>현재 운영 정보 확인 중인 검수용 페이지입니다.</b><span>사진·360° 투어·시설 안내는 확인할 수 있으며, 예약·요금·주소 등 실제 운영 정보는 사장님 확인 후 공개됩니다.</span></div>\n    <a href="#owner-review">확인할 항목 보기</a>\n  </div>\n</div>\n'''
          if 'class="review-banner"' not in html:
              html = html.replace('<body>\n', '<body>\n' + review_banner, 1)

          html = html.replace('<a href="#space">공간</a><a href="#tour">360° 투어</a><a href="#facilities">시설</a><a href="#guide">이용 안내</a><a href="#booking">예약 안내</a>', '<a href="#space">공간</a><a href="#tour">360° 투어</a><a href="#facilities">시설</a><a href="#guide">이용 안내</a><a href="#booking">예약 안내</a><a href="#owner-review">운영 정보 확인</a>')

          html = html.replace('예약 채널에서 확인</dd>', '—</dd>')
          html = html.replace('예약 시간에 맞춰 운영</dd>', '—</dd>')
          html = html.replace('예약 확정 후 상세 위치 안내</p>', '—</p>')
          html = html.replace('주차 가능 여부는 예약 전 운영자에게 확인</p>', '—</p>')
          html = html.replace('예약 채널 연결 예정</a>', '예약 링크 확인 중</a>')

          owner_section = '''\n  <section class="section owner-review-section" id="owner-review">\n    <div class="shell">\n      <header class="section-head">\n        <p class="kicker">OWNER REVIEW</p>\n        <h2>실제 운영을 위해<br>확인이 필요한 정보입니다.</h2>\n        <p>현재 값은 임의로 채우지 않았습니다. 사장님이 아래 항목을 확인해 주시면 예약 가능한 정식 홈페이지 정보로 반영합니다.</p>\n      </header>\n      <div class="owner-review-intro">\n        <b>확인 방법</b>\n        <p>각 항목의 실제 내용을 카카오톡으로 보내 주세요. 해당되지 않거나 아직 정해지지 않은 항목은 ‘없음’ 또는 ‘미정’이라고 알려주시면 됩니다.</p>\n      </div>\n      <div class="owner-review-grid">\n        <article><span>01</span><div><h3>정확한 상호명</h3><p>현재 표시된 이름이 맞는지, 한글·영문 표기를 함께 확인합니다.</p><strong data-review-field="businessName">—</strong></div></article>\n        <article><span>02</span><div><h3>예약 링크</h3><p>네이버 예약, 스페이스클라우드, 카카오톡 등 실제 예약 채널 주소입니다.</p><strong data-review-field="bookingUrl">—</strong></div></article>\n        <article><span>03</span><div><h3>주소·지도·찾아오는 길</h3><p>공개할 주소 범위, 건물·층·호수, 지도 링크와 가까운 역 안내입니다.</p><strong data-review-field="address">—</strong></div></article>\n        <article><span>04</span><div><h3>이용 요금</h3><p>평일·주말, 시간당·패키지, 연장 및 추가 인원 요금을 확인합니다.</p><strong data-review-field="price">—</strong></div></article>\n        <article><span>05</span><div><h3>기준·최대 인원</h3><p>기준 인원, 최대 수용 인원과 인원 추가 비용입니다.</p><strong data-review-field="capacity">—</strong></div></article>\n        <article><span>06</span><div><h3>운영시간</h3><p>이용 가능 시간, 최소 예약시간, 심야·밤샘 가능 여부입니다.</p><strong data-review-field="hours">—</strong></div></article>\n        <article><span>07</span><div><h3>주차 안내</h3><p>주차 가능 대수, 무료·유료 여부와 입차 방법입니다.</p><strong data-review-field="parking">—</strong></div></article>\n        <article><span>08</span><div><h3>문의 연락처</h3><p>공개 가능한 전화번호, 카카오톡, 인스타그램 등 문의 채널입니다.</p><strong data-review-field="contact">—</strong></div></article>\n        <article><span>09</span><div><h3>입실·퇴실 안내</h3><p>비대면 입실, 비밀번호 전달, 정리·청소·쓰레기 처리 방법입니다.</p><strong data-review-field="checkin">—</strong></div></article>\n        <article><span>10</span><div><h3>취소·환불 규정</h3><p>전액·부분 환불 기준, 당일 취소, 노쇼와 일정 변경 규정입니다.</p><strong data-review-field="refund">—</strong></div></article>\n        <article><span>11</span><div><h3>공간 이용 규정</h3><p>배달·취사·음주, 미성년자, 반려동물, 흡연·소음·파손 규정입니다.</p><strong data-review-field="rules">—</strong></div></article>\n        <article><span>12</span><div><h3>강점·추천 이용 목적</h3><p>다른 공간과의 차별점, 주요 고객층과 강조하고 싶은 시설입니다.</p><strong data-review-field="sellingPoints">—</strong></div></article>\n      </div>\n      <div class="owner-review-footer"><b>로고·대표 이미지·기존 예약 안내 문구</b><p>별도로 사용 중인 자료가 있다면 함께 전달해 주세요. 전달받은 운영 정보가 반영되면 이 검수 섹션과 상단 안내는 삭제하고 검색 노출을 활성화합니다.</p></div>\n    </div>\n  </section>\n'''
          if 'id="owner-review"' not in html:
              html = html.replace('  <section class="section faq-section" id="faq">', owner_section + '\n  <section class="section faq-section" id="faq">', 1)

          index.write_text(html, encoding='utf-8')

          config.write_text('''window.PARTYROOM_CONFIG = Object.freeze({\n  reviewMode: true,\n  businessName: "",\n  bookingUrl: "",\n  bookingLabel: "온라인 예약",\n  phone: "",\n  kakaoUrl: "",\n  instagramUrl: "",\n  address: "",\n  mapUrl: "",\n  directions: "",\n  hours: "",\n  price: "",\n  capacity: "",\n  parking: "",\n  checkin: "",\n  refund: "",\n  rules: "",\n  sellingPoints: "",\n  bookingNote: "운영 정보 확인 후 예약 링크와 상세 안내가 공개됩니다."\n});\n''', encoding='utf-8')

          script = js.read_text(encoding='utf-8')
          script = script.replace('20260710-service', '20260710-review')
          script = script.replace('document.querySelectorAll("[data-config-text]").forEach(el=>{const value=config[el.dataset.configText];if(value)el.textContent=value});', 'document.querySelectorAll("[data-config-text]").forEach(el=>{const value=config[el.dataset.configText];el.textContent=value||"—";el.classList.toggle("is-pending",!value)});')
          script = script.replace('}else{bookingButton.setAttribute("aria-disabled","true");bookingButton.textContent="예약 채널 연결 예정"}', '}else{bookingButton.setAttribute("aria-disabled","true");bookingButton.textContent="예약 링크 확인 중";bookingButton.addEventListener("click",event=>event.preventDefault())}')
          inject = '''\nconst reviewFieldMap={\n  businessName:"businessName",bookingUrl:"bookingUrl",address:"address",price:"price",capacity:"capacity",hours:"hours",parking:"parking",\n  contact:"phone",checkin:"checkin",refund:"refund",rules:"rules",sellingPoints:"sellingPoints"\n};\ndocument.querySelectorAll("[data-review-field]").forEach(el=>{\n  const field=el.dataset.reviewField;let value=config[reviewFieldMap[field]||field]||"";\n  if(field==="contact")value=[config.phone,config.kakaoUrl,config.instagramUrl].filter(Boolean).join(" · ");\n  el.textContent=value||"확인 필요";el.classList.toggle("is-complete",Boolean(value));\n});\n'''
          if 'const reviewFieldMap=' not in script:
              script = script.replace('const shareData=', inject + '\nconst shareData=', 1)
          js.write_text(script, encoding='utf-8')

          style = css.read_text(encoding='utf-8')
          style = style.replace('20260710-service', '20260710-review')
          extra = '''\n/* Owner review mode */\n.review-banner{position:relative;z-index:75;margin-top:72px;background:#fff6cf;border-bottom:1px solid #ead98d;color:#4b3b00}.review-banner-inner{min-height:68px;display:flex;align-items:center;justify-content:space-between;gap:24px;padding-top:12px;padding-bottom:12px}.review-banner b,.review-banner span{display:block}.review-banner b{font-size:14px}.review-banner span{margin-top:4px;font-size:12px;line-height:1.55;color:#765f08}.review-banner a{flex:0 0 auto;padding:10px 14px;border-radius:12px;background:#4b3b00;color:#fff;text-decoration:none;font-size:12px;font-weight:900}.is-pending{color:#8a96a3!important;font-style:normal}.booking-primary[aria-disabled="true"]{opacity:.58;cursor:not-allowed;box-shadow:none}.owner-review-section{background:#fff}.owner-review-intro,.owner-review-footer{padding:22px 24px;border-radius:22px;background:#f5f8fb;border:1px solid var(--line)}.owner-review-intro{margin-bottom:18px}.owner-review-intro b,.owner-review-footer b{font-size:15px}.owner-review-intro p,.owner-review-footer p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.7}.owner-review-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.owner-review-grid article{display:grid;grid-template-columns:44px minmax(0,1fr);gap:15px;padding:22px;border:1px solid var(--line);border-radius:22px;background:#fff}.owner-review-grid article>span{display:grid;place-items:center;width:40px;height:40px;border-radius:13px;background:var(--navy);color:var(--lime);font-size:11px;font-weight:950}.owner-review-grid h3{margin:1px 0 7px;font-size:17px}.owner-review-grid p{margin:0;color:var(--muted);font-size:13px;line-height:1.65}.owner-review-grid strong{display:inline-flex;width:max-content;max-width:100%;margin-top:13px;padding:7px 10px;border-radius:999px;background:#fff3cd;color:#755b00;font-size:11px;font-weight:900}.owner-review-grid strong.is-complete{background:#e1f7e8;color:#176235}.owner-review-footer{margin-top:18px}.owner-review-section .section-head{margin-bottom:28px}@media(max-width:720px){.review-banner{margin-top:72px}.review-banner-inner{align-items:flex-start;flex-direction:column;gap:10px}.review-banner a{width:100%;text-align:center}.owner-review-grid{grid-template-columns:1fr}.owner-review-grid article{padding:18px}.site-header{top:0}}\n'''
          if '/* Owner review mode */' not in style:
              style += extra
          css.write_text(style, encoding='utf-8')
          PY

          rm -f .github/workflows/add-partyroom-owner-review.yml

      - name: Commit review-mode page
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html partyroom/site.css partyroom/site.js partyroom/site-config.js .github/workflows
          git commit -m 'Add owner review placeholders to partyroom site'
          git push
