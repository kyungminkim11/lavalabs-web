name: Import partyroom 360 assets

on:
  push:
    paths:
      - 'works/partyroom-360-tour/import-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download partyroom panoramas
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p works/partyroom-360-tour/assets
          curl -L --fail --retry 3 'https://at.adobe.com/JthcWeqe0r1DjzAl' -o works/partyroom-360-tour/assets/scene-overview.png
          curl -L --fail --retry 3 'https://at.adobe.com/0evkhgukwtEd1jq7' -o works/partyroom-360-tour/assets/scene-lounge.png
          curl -L --fail --retry 3 'https://at.adobe.com/Wumr1ghkrBJMW3Qd' -o works/partyroom-360-tour/assets/scene-table-pc.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/W7z4fZifbLcNxHbE' -o works/partyroom-360-tour/assets/scene-kitchen.png
          test -s works/partyroom-360-tour/assets/scene-overview.png
          test -s works/partyroom-360-tour/assets/scene-lounge.png
          test -s works/partyroom-360-tour/assets/scene-table-pc.jpg
          test -s works/partyroom-360-tour/assets/scene-kitchen.png
          file works/partyroom-360-tour/assets/scene-overview.png
          file works/partyroom-360-tour/assets/scene-lounge.png
          file works/partyroom-360-tour/assets/scene-table-pc.jpg
          file works/partyroom-360-tour/assets/scene-kitchen.png

      - name: Point viewer to current assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('works/partyroom-360-tour/index.html')
          text=path.read_text(encoding='utf-8')
          replacements={
            'assets/scene-overview.jpg':'assets/scene-overview.png?v=20260710-logo',
            'assets/scene-lounge.jpg':'assets/scene-lounge.png?v=20260710-logo',
            'assets/scene-table-pc.png?v=20260710-logo':'assets/scene-table-pc.jpg?v=20260710-pczone',
            'assets/scene-table-pc.jpg':'assets/scene-table-pc.jpg?v=20260710-pczone',
            'assets/scene-kitchen.jpg':'assets/scene-kitchen.png?v=20260710-logo',
          }
          for old,new in replacements.items():
              text=text.replace(old,new)
          path.write_text(text,encoding='utf-8')
          PY

      - name: Commit partyroom assets
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add works/partyroom-360-tour/assets works/partyroom-360-tour/index.html
          if git diff --cached --quiet; then
            echo 'No asset changes.'
          else
            git commit -m 'Replace partyroom PC zone panorama'
            git push
          fi
