name: Finalize partyroom delivery

on:
  push:
    paths:
      - '.github/workflows/finalize-partyroom-delivery.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply final delivery fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Missing expected text in {path}: {old[:80]}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          # Customer site: corrected floorplan labels.
          replace_required(
              'partyroom/service-upgrade.js',
              '<text class="zone-small" x="691" y="91" text-anchor="middle">싱크대</text>',
              '<text class="zone-small" x="691" y="91" text-anchor="middle">행거</text>'
          )
          replace_required(
              'partyroom/service-upgrade.js',
              '<text class="zone-small" x="881" y="290" text-anchor="middle" transform="rotate(-90 881 290)">주방 수납</text>',
              '<text class="zone-small" x="881" y="290" text-anchor="middle" transform="rotate(-90 881 290)">싱크대</text>'
          )

          # Initial fallback floorplan uses the same final labels.
          replace_required(
              'partyroom/site.js',
              '<text class="map-small" x="621" y="79" text-anchor="middle">싱크대</text>',
              '<text class="map-small" x="621" y="79" text-anchor="middle">행거</text>'
          )
          replace_required(
              'partyroom/site.js',
              '<text class="map-small" x="808" y="271" text-anchor="middle" transform="rotate(-90 808 271)">주방</text>',
              '<text class="map-small" x="808" y="271" text-anchor="middle" transform="rotate(-90 808 271)">싱크대</text>'
          )
          replace_required(
              'partyroom/site.js',
              'service-upgrade.js?v=20260710-entry-mobile',
              'service-upgrade.js?v=20260711-final-v1'
          )
          replace_required(
              'partyroom/site.js',
              'service-upgrade.js?v=20260710-entry-left-v2',
              'service-upgrade.js?v=20260711-final-v1'
          )

          # Remove unintended carrier branding from the generic Wi-Fi amenity.
          replace_required(
              'partyroom/index.html',
              '<article><b>KT</b><h3>Wi-Fi</h3><p>2.4GHz, 5GHz와 Mesh 무선랜을 제공합니다. 접속 정보는 현장에서 확인합니다.</p></article>',
              '<article><b>WiFi</b><h3>Wi-Fi</h3><p>2.4GHz, 5GHz와 Mesh 무선랜을 제공합니다. 접속 정보는 현장에서 확인합니다.</p></article>'
          )
          replace_required(
              'partyroom/index.html',
              '/partyroom/site.js?v=20260710-entry-left-v2',
              '/partyroom/site.js?v=20260711-final-v1'
          )

          # Case-study floorplan labels.
          replace_required(
              'works/partyroom-360-tour/case.js',
              '<text class="map-small" x="612" y="79" text-anchor="middle">싱크대</text>',
              '<text class="map-small" x="612" y="79" text-anchor="middle">행거</text>'
          )
          replace_required(
              'works/partyroom-360-tour/case.js',
              '<text class="map-small" x="805" y="271" text-anchor="middle" transform="rotate(-90 805 271)">주방 수납</text>',
              '<text class="map-small" x="805" y="271" text-anchor="middle" transform="rotate(-90 805 271)">싱크대</text>'
          )

          # Preserve source image proportions in every case-study gallery.
          css_path = Path('works/partyroom-360-tour/case-mobile.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '/* final-delivery-v1: preserve original media proportions */'
          if marker not in css:
              css += '''\n\n/* final-delivery-v1: preserve original media proportions */\n.photo-grid figure,\n.photo-grid .photo-landscape,\n.photo-grid .photo-portrait {\n  aspect-ratio: auto !important;\n}\n.photo-grid .photo-open,\n.detail-card .photo-open,\n.detail-card-wide .photo-open,\n.detail-card-tall .photo-open,\n.detail-card button,\n.detail-card-wide button,\n.detail-card-tall button {\n  height: auto !important;\n  min-height: 0 !important;\n  aspect-ratio: auto !important;\n}\n.photo-grid picture,\n.photo-grid img,\n.detail-card picture,\n.detail-card img {\n  width: 100% !important;\n  height: auto !important;\n  aspect-ratio: auto !important;\n  object-fit: contain !important;\n}\n.photo-grid figure,\n.detail-card {\n  align-self: start;\n}\n.explorer-media img {\n  object-fit: contain !important;\n  background: #e9eef2;\n}\n'''
              css_path.write_text(css, encoding='utf-8')

          # Cache-bust all corrected case-study assets.
          index_path = Path('works/partyroom-360-tour/index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('case.css?v=20260711-mobile-v1', 'case.css?v=20260711-final-v1')
          index = index.replace('case-mobile.css?v=20260711-mobile-v1', 'case-mobile.css?v=20260711-final-v1')
          index = index.replace('case.js?v=20260711-mobile-v1', 'case.js?v=20260711-final-v1')
          index_path.write_text(index, encoding='utf-8')
          PY

      - name: Validate final files
        shell: bash
        run: |
          grep -q '>행거</text>' partyroom/service-upgrade.js
          grep -q '>싱크대</text>' partyroom/service-upgrade.js
          grep -q '<b>WiFi</b><h3>Wi-Fi</h3>' partyroom/index.html
          grep -q '>행거</text>' works/partyroom-360-tour/case.js
          grep -q 'final-delivery-v1: preserve original media proportions' works/partyroom-360-tour/case-mobile.css
          grep -q 'case.js?v=20260711-final-v1' works/partyroom-360-tour/index.html

      - name: Commit final delivery fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html partyroom/site.js partyroom/service-upgrade.js works/partyroom-360-tour/index.html works/partyroom-360-tour/case.js works/partyroom-360-tour/case-mobile.css
          git diff --cached --quiet || git commit -m 'Finalize partyroom floorplans, Wi-Fi label and photo ratios [skip ci]'
          git push
