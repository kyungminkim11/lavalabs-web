name: Import partyroom HQ assets

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/import-partyroom-hq-assets.yml'

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and install optimized partyroom images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p partyroom/assets
          curl -L --fail --retry 3 --retry-delay 2 'https://at.adobe.com/btfbUmT97sFlhOis' -o /tmp/partyroom-assets.zip
          file /tmp/partyroom-assets.zip
          unzip -t /tmp/partyroom-assets.zip
          unzip -o /tmp/partyroom-assets.zip -d partyroom/assets
          rm -f partyroom/assets/test-path.txt partyroom/assets/path-as-file.webp
          ls -lh partyroom/assets

      - name: Commit image assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/assets
          if git diff --cached --quiet; then
            echo 'No asset changes to commit.'
            exit 0
          fi
          git commit -m 'Add high-resolution partyroom production assets'
          git push
