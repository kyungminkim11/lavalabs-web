name: Build social previews

on:
  push:
    paths:
      - "scripts/build_social_previews.py"
      - "scripts/fix_social_meta.py"
      - "scripts/refine_social_descriptions.py"
      - "scripts/replace_social_mark.py"
      - ".github/workflows/build-social-previews.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install pillow
      - run: |
          python scripts/build_social_previews.py
          python scripts/replace_social_mark.py
          python scripts/fix_social_meta.py
          python scripts/refine_social_descriptions.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/social *.html
          git diff --cached --quiet && exit 0
          git commit -m "Refresh social previews [skip ci]"
          git push
