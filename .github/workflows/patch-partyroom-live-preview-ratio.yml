name: Patch partyroom live preview ratio

on:
  push:
    paths:
      - '.github/workflows/patch-partyroom-live-preview-ratio.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link live preview ratio stylesheet
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('works/partyroom-360-tour/index.html')
          text = path.read_text(encoding='utf-8')
          link = '  <link rel="stylesheet" href="/works/partyroom-360-tour/live-preview-fix.css?v=20260711-live-preview-v1">\n'
          anchor = '  <link rel="stylesheet" href="/works/partyroom-360-tour/case-mobile.css?v=20260711-final-v1">\n'
          if 'live-preview-fix.css' not in text:
              text = text.replace(anchor, anchor + link, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add works/partyroom-360-tour/index.html
          git diff --cached --quiet || git commit -m 'Fix live customer-site preview ratio [skip ci]'
          git push
