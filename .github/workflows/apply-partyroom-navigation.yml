name: Apply partyroom navigation patch

on:
  push:
    paths:
      - 'works/partyroom-360-tour/navigation-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert navigation script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('works/partyroom-360-tour/index.html')
          text=path.read_text(encoding='utf-8')
          for old in ('navigation-fix.js?v=20260710b','navigation-fix.js?v=20260710c'):
              text=text.replace(old,'navigation-fix.js?v=20260710d')
          tag='<script src="navigation-fix.js?v=20260710d"></script>'
          if tag not in text:
              text=text.replace('</body>',tag+'</body>')
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add works/partyroom-360-tour/index.html
          if git diff --cached --quiet; then
            echo 'No changes.'
          else
            git commit -m 'Load hover-safe partyroom arrows'
            git push
          fi
