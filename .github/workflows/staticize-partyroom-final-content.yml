name: Staticize partyroom final content

on:
  push:
    paths:
      - '.github/workflows/staticize-partyroom-final-content.yml'

permissions:
  contents: write

jobs:
  staticize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move final customer content into HTML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p=Path('partyroom/index.html')
          html=p.read_text(encoding='utf-8')

          if '/partyroom/service-upgrade.css' not in html:
              html=html.replace(
                  '<link rel="stylesheet" href="/partyroom/mobile-fix.css?v=20260711-mobile-fix-v1">',
                  '<link rel="stylesheet" href="/partyroom/mobile-fix.css?v=20260711-mobile-fix-v1">\n  <link rel="stylesheet" href="/partyroom/service-upgrade.css?v=20260711-final-static-v1">'
              )

          replacements={
            '<div class="feature-copy"><span>01 · MAIN LOUNGE</span><h3>TV · 소파 · 노래방 · PS5</h3><p>소파에서 대형 TV를 보며 노래방과 콘솔 게임을 함께 즐기는 메인 라운지입니다.</p></div>':'<div class="feature-copy"><span>01 · MAIN LOUNGE</span><h3>75인치 UHD TV · TJ 노래방 · PS5</h3><p>JBL 마이크로 노래를 즐기고 PS5와 Switch 2 콘솔 게임을 함께 이용하는 메인 라운지입니다.</p></div>',
            '<div class="feature-copy"><span>02 · PC ZONE</span><h3>PC 게임존</h3><p>여러 대의 PC와 게이밍 좌석이 한쪽 벽면에 나란히 배치되어 있습니다.</p></div>':'<div class="feature-copy"><span>02 · PC ZONE</span><h3>고사양 PC 5대</h3><p>CPU 5600X급 이상, 그래픽카드 4060급 구성과 27인치 200Hz 모니터를 제공합니다. 세부 사양은 PC별로 다를 수 있습니다.</p></div>',
            '<div class="feature-copy"><span>03 · HOLDEM</span><h3>홀덤 테이블</h3><p>전용 테이블과 칩·카드가 준비된 게임 구역입니다.</p></div>':'<div class="feature-copy"><span>03 · HOLDEM</span><h3>10인 홀덤 테이블</h3><p>단체 게임을 위한 전용 테이블과 칩·카드가 준비되어 있습니다.</p></div>'
          }
          for old,new in replacements.items():
              html=html.replace(old,new)

          amenities='''<div class="amenity-grid">
            <article><b>75</b><h3>75인치 UHD TV</h3><p>TJ 노래방 기기, JBL 마이크와 PS5를 대형 화면으로 이용할 수 있습니다.</p></article>
            <article><b>PC</b><h3>고사양 PC 5대</h3><p>27인치 200Hz 모니터와 CPU 5600X급 이상·그래픽카드 4060급 구성을 제공합니다.</p></article>
            <article><b>♠</b><h3>10인 홀덤 테이블</h3><p>홀덤 칩과 카드, 여러 종류의 보드게임을 함께 이용할 수 있습니다.</p></article>
            <article><b>GAME</b><h3>PS5 · Switch 2</h3><p>스포츠, 격투와 파티게임 등 여러 명이 함께 즐기기 좋은 타이틀이 준비되어 있습니다.</p></article>
            <article><b>WiFi</b><h3>KT 인터넷 · CCTV</h3><p>무선 인터넷을 제공하며 안전을 위해 실내 CCTV가 녹화 운영됩니다.</p></article>
            <article><b>＋</b><h3>간단 취사 · 화장실</h3><p>인덕션으로 라면 등 간단 조리가 가능하며 건물 공용 화장실을 파티룸 전용으로 이용합니다.</p></article>
          </div>
          <div class="detail-gallery"'''
          html=re.sub(r'<div class="amenity-grid">.*?</div>\s*<div class="detail-gallery"',amenities,html,count=1,flags=re.S)

          if 'id="games"' not in html:
              games='''
  <section class="section service-game-section" id="games">
    <div class="shell">
      <header class="section-head"><p class="kicker">GAME LIBRARY</p><h2>어떤 게임이 있는지<br>예약 전에 확인하세요.</h2><p>대표 보유 게임을 정리했습니다. 콘솔 타이틀과 보드게임 구성은 운영 상황에 따라 추가·교체될 수 있습니다.</p></header>
      <div class="game-showcase">
        <article class="game-card">
          <div class="game-card__media"><img src="/partyroom/assets/playstation-1800.webp?v=20260711-final-static-v1" alt="PS5와 Nintendo Switch 2 게임 타이틀" loading="lazy" decoding="async"></div>
          <div class="game-card__body"><p class="game-card__eyebrow">CONSOLE GAMES</p><h3>PS5 · Nintendo Switch 2</h3><p class="game-card__desc">격투, 스포츠와 가족·파티 게임까지 여러 명이 함께 즐기기 좋은 타이틀을 준비했습니다.</p><ul class="game-tag-list" aria-label="대표 콘솔 게임 목록"><li>철권 8</li><li>EA SPORTS FC 25</li><li>MLB The Show 24</li><li>UFC 5</li><li>Overcooked</li><li>Mario Kart World</li><li>Mario Party</li><li>Nintendo Switch Sports</li></ul></div>
        </article>
        <article class="game-card">
          <div class="game-card__media game-card__media--contain"><img src="/partyroom/assets/boardgames-1400.webp?v=20260711-final-static-v1" alt="보드게임 진열장" loading="lazy" decoding="async"></div>
          <div class="game-card__body"><p class="game-card__eyebrow">BOARD GAMES</p><h3>파티·전략 보드게임</h3><p class="game-card__desc">짧게 즐기는 파티게임부터 여러 명이 오래 즐기는 전략게임까지 대표 구성을 확인할 수 있습니다.</p><ul class="game-tag-list" aria-label="대표 보드게임 목록"><li>홀덤</li><li>루미큐브</li><li>할리갈리</li><li>UNO</li><li>스플렌더</li><li>티켓 투 라이드: 유럽</li><li>모노폴리</li><li>딕싯</li><li>블로커스</li><li>아줄</li><li>다빈치 코드</li></ul></div>
        </article>
      </div>
      <p class="inventory-note">게임 디스크와 구성품은 이용 후 원래 위치에 정리해 주세요. 실제 이용 가능 여부는 예약 전 운영자에게 최종 확인하는 것이 가장 정확합니다.</p>
    </div>
  </section>
'''
              html=html.replace('\n  <section class="section guide-section" id="guide">',games+'\n  <section class="section guide-section" id="guide">',1)

          if 'id="location"' not in html:
              location='''
  <section class="section location-section" id="location">
    <div class="shell">
      <header class="section-head"><p class="kicker">LOCATION</p><h2>야당역에서 도보 약 1분,<br>1층 Room 1로 오세요.</h2><p>건물 1층 가운데 문으로 들어온 뒤 왼쪽 Room 1이 퓨처스페이스 1호입니다.</p></header>
      <div class="location-layout">
        <article class="map-card"><div class="map-frame"><iframe title="퓨처스페이스 게임파티룸 위치 지도" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%ED%8C%8C%EC%A3%BC%EC%8B%9C%20%EC%86%A1%ED%95%991%EA%B8%B8%2067-21%2C%201%EC%B8%B5&output=embed"></iframe></div></article>
        <article class="location-info-card">
          <p class="location-label">ADDRESS</p><h3>퓨처스페이스 게임파티룸</h3>
          <div class="address-box"><strong>경기도 파주시 송학1길 67-21, 1층</strong><button class="copy-address" type="button" data-address="경기도 파주시 송학1길 67-21, 1층">주소 복사</button></div>
          <div class="map-actions"><a class="primary-map" href="https://naver.me/FdqhKL45" target="_blank" rel="noopener">네이버지도에서 길찾기</a><a href="https://map.kakao.com/?q=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%ED%8C%8C%EC%A3%BC%EC%8B%9C%20%EC%86%A1%ED%95%991%EA%B8%B8%2067-21" target="_blank" rel="noopener">카카오맵 열기</a><a href="https://www.google.com/maps/search/?api=1&query=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%ED%8C%8C%EC%A3%BC%EC%8B%9C%20%EC%86%A1%ED%95%991%EA%B8%B8%2067-21" target="_blank" rel="noopener">Google 지도 열기</a></div>
          <div class="route-grid"><div class="route-card"><b>자가용·택시</b><p>내비게이션에 주소를 입력한 뒤 건물 1층 가운데 문으로 들어오세요. 왼쪽 Room 1이 퓨처스페이스 1호입니다.</p></div><div class="route-card"><b>대중교통</b><p>야당역 3번 출구에서 도보 약 1분 거리입니다. 정확한 경로는 네이버지도 길찾기에서 확인해 주세요.</p></div><div class="route-card"><b>주차</b><p>건물 주차장에 차량 2대까지 무료로 주차할 수 있으며 시간 제한은 없습니다.</p></div></div>
          <p class="location-warning">현재 예약과 이용은 퓨처스페이스 1호 기준입니다.</p>
        </article>
      </div>
    </div>
  </section>
'''
              html=html.replace('\n  <section class="section booking-section" id="booking">',location+'\n  <section class="section booking-section" id="booking">',1)

          html=html.replace(
              '<a class="button primary booking-primary" id="bookingPrimary" href="#booking">예약 링크 확인 중</a><p class="booking-note" data-config-text="bookingNote"></p>',
              '<div class="booking-actions"><a class="button primary booking-primary" id="bookingPrimary" href="https://naver.me/FdqhKL45" target="_blank" rel="noopener">네이버 예약하기</a><a class="button booking-secondary" id="bookingSecondary" href="https://www.spacecloud.kr/space/77835" target="_blank" rel="noopener">스페이스클라우드 예약</a></div><p class="booking-note" data-config-text="bookingNote">예약 날짜와 상품에 따라 실제 결제 금액이 달라질 수 있으므로 예약 화면에서 최종 금액을 확인해 주세요.</p>'
          )
          html=html.replace(
              '<article><span>CONTACT</span><h3>운영자 문의</h3><p>시설·예약 관련 문의는 운영자 채널을 이용해 주세요.</p><div class="contact-links"><a class="text-link config-link" data-config-link="phone" data-link-type="tel" hidden>전화 문의</a><a class="text-link config-link" data-config-link="kakaoUrl" hidden>카카오톡 문의</a></div></article>',
              '<article><span>CONTACT</span><h3>운영자 문의</h3><p>네이버 톡톡, 문자 또는 전화로 문의할 수 있습니다.</p><div class="contact-links"><a class="text-link config-link" data-config-link="phone" data-link-type="tel" href="tel:050714007266">전화 문의</a><a class="text-link config-link" data-config-link="kakaoUrl" hidden>카카오톡 문의</a></div></article>'
          )
          html=html.replace(
              '<article><span>BEFORE VISIT</span><h3>방문 전 확인</h3><p>예약 시간, 인원, 주차, 취소·환불 규정을 예약 채널에서 최종 확인해 주세요.</p></article>',
              '<article><span>BEFORE VISIT</span><h3>방문 전 확인</h3><p>시설·청소 보증금 10만원이 별도이며 퇴실 점검 후 1~3일 내 환급됩니다. 당일 취소는 환불되지 않습니다.</p></article>'
          )

          p.write_text(html,encoding='utf-8')

          # Avoid loading the same service stylesheet twice now that it is static.
          p=Path('partyroom/service-upgrade.js')
          js=p.read_text(encoding='utf-8')
          old='''  const styleLink=document.createElement("link");
          styleLink.rel="stylesheet";
          styleLink.href="/partyroom/service-upgrade.css?v=20260710-entry-left-v2";
          document.head.appendChild(styleLink);'''
          new='''  if(!document.querySelector('link[href*="/partyroom/service-upgrade.css"]')){
            const styleLink=document.createElement("link");
            styleLink.rel="stylesheet";
            styleLink.href="/partyroom/service-upgrade.css?v=20260711-final-static-v1";
            document.head.appendChild(styleLink);
          }'''
          if old in js: js=js.replace(old,new)
          p.write_text(js,encoding='utf-8')
          PY

      - name: Validate static final content
        shell: bash
        run: |
          grep -q 'id="games"' partyroom/index.html
          grep -q 'id="location"' partyroom/index.html
          grep -q 'service-upgrade.css?v=20260711-final-static-v1' partyroom/index.html
          grep -q 'id="bookingSecondary"' partyroom/index.html
          grep -q '75인치 UHD TV · TJ 노래방 · PS5' partyroom/index.html
          grep -q 'querySelector.*service-upgrade.css' partyroom/service-upgrade.js

      - name: Commit static final content
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html partyroom/service-upgrade.js
          git diff --cached --quiet || git commit -m 'Staticize final partyroom content and navigation [skip ci]'
          git push
