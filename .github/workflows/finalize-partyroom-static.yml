name: Finalize partyroom static content

on:
  push:
    paths:
      - '.github/workflows/finalize-partyroom-static.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove review markup and publish key facts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('partyroom/index.html')
          text=p.read_text(encoding='utf-8')
          text=re.sub(r'\n<div class="review-banner" role="status">.*?</div>\n<a class="skip-link"', '\n<a class="skip-link"', text, count=1, flags=re.S)
          text=text.replace('<a href="#owner-review">운영 정보 확인</a>','')
          text=re.sub(r'\n\s*<section class="section owner-review-section" id="owner-review">.*?</section>\n', '\n', text, count=1, flags=re.S)
          text=text.replace('대형 TV와 소파, 노래방, 플레이스테이션 5, PC 게임존, 홀덤 테이블, 보드게임과 다인석 테이블을 갖춘 프라이빗 게임파티룸입니다.','야당역에서 도보 약 1분. 30평대 넓은 공간에 고사양 PC 5대, 75인치 UHD TV, PS5와 Switch 2, TJ 노래방, 10인 홀덤 테이블을 갖춘 프라이빗 게임파티룸입니다.')
          text=text.replace('<ul class="hero-points" aria-label="주요 시설"><li>PC 게임존</li><li>PS5</li><li>노래방</li><li>홀덤</li><li>보드게임</li><li>주방</li></ul>','<ul class="hero-points" aria-label="주요 시설"><li>고사양 PC 5대</li><li>PS5 · Switch 2</li><li>TJ 노래방</li><li>10인 홀덤</li><li>최대 20인</li><li>무료주차 2대</li></ul>')
          old='''<div class="shell summary-grid">
                <article><strong>6</strong><span>주요 엔터테인먼트 시설</span></article>
                <article><strong>5</strong><span>연결된 360° 촬영 지점</span></article>
                <article><strong>PRIVATE</strong><span>예약한 일행만 사용하는 독립 공간</span></article>
                <article><strong>ALL-IN-ONE</strong><span>게임·식사·휴식을 한 공간에서</span></article>
              </div>'''
          new='''<div class="shell summary-grid">
                <article><strong>30평대</strong><span>단체 모임을 위한 넓은 프라이빗 공간</span></article>
                <article><strong>20명</strong><span>예약 상품 기준 최대 이용 인원</span></article>
                <article><strong>PC 5대</strong><span>27인치 200Hz 모니터와 고사양 구성</span></article>
                <article><strong>24H</strong><span>낮·밤·올데이·밤샘 선택 가능</span></article>
              </div>'''
          text=text.replace(old,new)
          text=text.replace('<footer class="site-footer"><div class="shell footer-inner"><div><b>퓨처스페이스 게임파티룸</b><p>게임 · 노래방 · 홀덤 · 모임을 위한 프라이빗 공간</p></div>','<footer class="site-footer"><div class="shell footer-inner"><div><b>퓨처스페이스 게임파티룸</b><p>경기도 파주시 송학1길 67-21, 1층 · 야당역 도보 약 1분 · 0507-1400-7266</p></div>')
          text=text.replace('<div class="mobile-actions" aria-label="빠른 이동"><a href="#tour">360° 투어</a><a href="#booking">예약 안내</a></div>','<div class="mobile-actions" aria-label="빠른 이동"><a href="#tour">360° 투어</a><a href="https://naver.me/FdqhKL45" target="_blank" rel="noopener">네이버 예약</a></div>')
          text=text.replace('"url":"https://space.lavalabs.co.kr/partyroom/",','"url":"https://space.lavalabs.co.kr/partyroom/",\n    "telephone":"0507-1400-7266",\n    "priceRange":"₩100,000-₩239,000",\n    "openingHours":"Mo-Su 00:00-24:00",\n    "sameAs":["https://naver.me/FdqhKL45","https://www.spacecloud.kr/space/77835"],')
          text=text.replace('"description":"PC 게임존, PS5, 노래방, 홀덤, 보드게임과 주방을 갖춘 프라이빗 게임파티룸"','"description":"야당역 도보 약 1분, 고사양 PC 5대와 PS5·Switch 2, TJ 노래방, 10인 홀덤 테이블을 갖춘 30평대 프라이빗 게임파티룸"')
          p.write_text(text,encoding='utf-8')
          PY
      - name: Commit static finalization
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/index.html
          git diff --cached --quiet || git commit -m 'Finalize partyroom static live content [skip ci]'
          git push
