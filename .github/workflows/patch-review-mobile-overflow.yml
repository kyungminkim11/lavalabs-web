name: Patch review mobile overflow

on:
  push:
    paths:
      - '.github/workflows/patch-review-mobile-overflow.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add mobile overflow stylesheet
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('partyroom/review/index.html')
          text = path.read_text(encoding='utf-8')
          link = '  <link rel="stylesheet" href="/partyroom/review/mobile-overflow-fix.css?v=20260711-overflow-v1">\n'
          if 'mobile-overflow-fix.css' not in text:
              text = text.replace('</head>', link + '</head>', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add partyroom/review/index.html
          git diff --cached --quiet || git commit -m 'Fix review page horizontal overflow on mobile [skip ci]'
          git push
