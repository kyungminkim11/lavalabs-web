name: Import partyroom 360 assets

on:
  push:
    paths:
      - 'works/partyroom-360-tour/import-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download partyroom panoramas
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p works/partyroom-360-tour/assets
          curl -L --fail --retry 3 'https://at.adobe.com/jyWryGyTnrV1eCpZ' -o works/partyroom-360-tour/assets/scene-overview.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/p893bkqyifr3gcLR' -o works/partyroom-360-tour/assets/scene-lounge.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/HVARcjUtBed0kHVU' -o works/partyroom-360-tour/assets/scene-table-pc.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/FUZA93P5PoA5eYGh' -o works/partyroom-360-tour/assets/scene-kitchen.jpg
          test -s works/partyroom-360-tour/assets/scene-overview.jpg
          test -s works/partyroom-360-tour/assets/scene-lounge.jpg
          test -s works/partyroom-360-tour/assets/scene-table-pc.jpg
          test -s works/partyroom-360-tour/assets/scene-kitchen.jpg
          file works/partyroom-360-tour/assets/*.jpg

      - name: Commit downloaded assets
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add works/partyroom-360-tour/assets
          if git diff --cached --quiet; then
            echo 'No asset changes.'
          else
            git commit -m 'Import partyroom 360 photos'
            git push
          fi
