name: Build social previews

on:
  push:
    paths:
      - "scripts/build_social_previews.py"
      - ".github/workflows/build-social-previews.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-previews
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image tools and Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install pillow

      - name: Generate page-specific social previews
        run: python scripts/build_social_previews.py

      - name: Commit generated previews and metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/social *.html
          if git diff --cached --quiet; then
            echo "No social preview changes"
            exit 0
          fi
          git commit -m "Generate page-specific social previews [skip ci]"
          git push
