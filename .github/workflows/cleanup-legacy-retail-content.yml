name: Cleanup legacy retail content

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-legacy-retail-content.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace legacy brand and fountain pen examples
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = [
              ('블루블랙펜샵', '샘플 리테일 매장'),
              ('블루블랙 펜샵', '샘플 리테일 매장'),
              ('블루블랙', '샘플 리테일'),
              ('BlueBlack Pen Shop', 'Sample Retail Store'),
              ('Blue Black Pen Shop', 'Sample Retail Store'),
              ('BlueBlack', 'Sample Retail'),
              ('Blue Black', 'Sample Retail'),
              ('세일러 프로기어 슬림 블랙 EF', '프리미엄 블렌드 티 기프트 세트'),
              ('세일러 프로피트 21', '프리미엄 블렌드 티 기프트 세트'),
              ('만년필·문구', '홈·리빙 소품'),
              ('만년필', '리테일 상품'),
              ('펜촉', '옵션'),
              ('시필펜', '전시 샘플'),
              ('병잉크', '소모품'),
              ('투명 배럴', '투명 용기'),
              ('Pen Buffet', 'Product Builder'),
              ('Fountain Pens', 'Retail Products'),
              ('Fountain Pen', 'Retail Product'),
              ('fountain pens', 'retail products'),
              ('fountain pen', 'retail product'),
          ]

          allowed = {'.html', '.js', '.json', '.md', '.css', '.txt', '.xml'}
          excluded = {
              Path('assets/content-neutralizer.js'),
              Path('.github/workflows/cleanup-legacy-retail-content.yml'),
          }

          changed = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in allowed or path in excluded:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          print('\n'.join(changed) if changed else '(none)')
          PY

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No legacy content remained."
          else
            git commit -m "Remove legacy fountain pen and BlueBlack references"
            git push
          fi
